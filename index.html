<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyPro - Melhore o seu estudo</title>
  <meta name="description" content="StudyPro — organize seus estudos para o ENEM por matéria, módulo e conteúdo, com progresso salvo automaticamente." />

  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#09090B" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="StudyPro" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- TailwindCSS (CDN, sem build/Node) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Plus Jakarta Sans', 'Inter', 'sans-serif'] },
          colors: { canvas: '#09090B' },
        }
      }
    }
  </script>

  <!-- Chart.js (gráficos de pizza e barras) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <link rel="stylesheet" href="styles.css" />
</head>
<body class="font-sans antialiased">

  <div id="login-root"></div>

  <div id="app" class="flex h-screen overflow-hidden" style="display:none">

    <!-- Backdrop mobile -->
    <div id="sidebar-backdrop" class="hidden fixed inset-0 bg-black/60 z-30 lg:hidden"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar fixed lg:relative inset-y-0 left-0 z-40 w-72 h-screen flex-shrink-0 border-r border-white/5 bg-[#0b0b0e]/95 lg:bg-[#0b0b0e]/50">
      <div id="sidebar-content" class="h-full"></div>
    </aside>

    <!-- Conteúdo principal -->
    <div class="flex-1 flex flex-col min-w-0 h-screen overflow-hidden">
      <header id="header" class="h-[68px] flex-shrink-0 flex items-center gap-4 px-4 md:px-6 border-b border-white/5 bg-[#09090B]/70 backdrop-blur-xl z-20"></header>
      <main id="main-content" class="flex-1 overflow-y-auto p-4 md:p-8"></main>
    </div>
  </div>

  <div id="toast-wrap" class="fixed bottom-5 right-5 z-[100] flex flex-col gap-2 items-end"></div>
  <div id="modal-root"></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
